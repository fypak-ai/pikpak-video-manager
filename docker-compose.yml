version: '3.9'

services:
  backend:
    build: ./backend
    container_name: pikpak-backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - playwright_cache:/root/.cache/ms-playwright
    depends_on: []
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pikpak-frontend
    env_file: .env
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pikpak-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  playwright_cache:
